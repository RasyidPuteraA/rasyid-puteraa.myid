<body class="admin-page admin-login-page" data-admin-page="login">
  <main class="main">
    <section class="section admin-login-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-5 col-md-7">
            <div class="card border-0 shadow-sm admin-card admin-login-card">
              <div class="card-body p-4 p-lg-5">
                <div class="text-center mb-4">
                  <span class="badge border text-dark admin-login-badge">Secure Backend Auth</span>
                  <h1 class="h3 mt-3 mb-2">Master Admin Login</h1>
                  <p class="admin-login-subtitle mb-0">Akses ini hanya untuk akun master yang tersimpan di database.</p>
                </div>

                <form id="admin-login-form" novalidate>
                  <div class="mb-3">
                    <label for="admin-username" class="form-label">Username</label>
                    <input id="admin-username" name="username" type="text" class="form-control"
                      placeholder="Enter username" required>
                  </div>

                  <div class="mb-3">
                    <label for="admin-password" class="form-label">Password</label>
                    <input id="admin-password" name="password" type="password" class="form-control"
                      placeholder="Enter password" required>
                  </div>

                  <div id="admin-login-error" class="alert alert-danger py-2 mb-3 d-none" role="alert"></div>

                  <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Login
                  </button>
                </form>

                <div class="mt-4 text-center">
                  <a class="admin-quiet-link" href="index.html">Back to public website</a>
                </div>
              </div>
            </div>

            <p class="admin-help-text text-center mt-3 mb-0">Gunakan kredensial akun master dari database production.</p>
          </div>
        </div>
